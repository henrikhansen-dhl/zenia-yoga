{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Zenia Yoga{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'booking/app.css' %}">
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <div>
                <p class="eyebrow">Mindful movement</p>
                <a class="brand" href="{% url 'booking:class_list' %}">Zenia Yoga</a>
            </div>
            <a class="admin-link" href="/admin/">Instructor login</a>
        </header>

        {% if messages %}
            <section class="messages">
                {% for message in messages %}
                    <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </section>
        {% endif %}

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
